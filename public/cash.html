<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Касса</title>

    <style>
        body {
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: #1f2937;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 28px;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            background: #16a34a;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #15803d;
        }
    </style>
</head>

<body>

    <h1>💰 Касса</h1>

    <div class="card">
        💵 Наличные:
        <span id="cash">0</span> грн
    </div>

    <div class="card">
        💳 Карта:
        <span id="card">0</span> грн
    </div>

    <div class="card">
        📲 Telegram:
        <span id="tg">0</span> грн
    </div>

    <div class="card">
        💰 Общая выручка:
        <span id="total">0</span> грн
    </div>

    <button onclick="closeShift()">
        Закрыть смену
    </button>

    <script src="cash.js"></script>

</body>

</html>
