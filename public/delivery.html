<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прием товара</title>

    <style>
        body {
            background: #111827;
            color: white;
            font-family: Arial, sans-serif;
            padding: 40px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        select,
        input,
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            background: #2563eb;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #1d4ed8;
        }
    </style>
</head>

<body>

    <h1>📥 Прием товара</h1>

    <select id="product"></select>

    <input
        id="quantity"
        type="number"
        min="1"
        placeholder="Количество">

    <input
        id="supplier"
        type="text"
        placeholder="Поставщик">

    <button onclick="acceptDelivery()">
        Принять товар
    </button>

    <script src="delivery.js"></script>

</body>

</html>
